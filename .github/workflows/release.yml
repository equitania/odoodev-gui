name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    # tauri-action creates the GitHub Release and uploads assets via the
    # GITHUB_TOKEN. Repos default that token to read-only, which makes the
    # release-create call fail with "Resource not accessible by integration".
    # contents: write grants exactly the release/asset write scope it needs.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
      - name: Install system deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile || pnpm install
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (minisign / Ed25519). Required so tauri-action emits the
          # .sig files and latest.json the auto-updater verifies against the pubkey
          # in tauri.conf.json. Generate with `pnpm tauri signer generate`.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # The signing key was generated without a password, so no password env
          # is passed (an empty password matches the key). If you ever regenerate
          # the key WITH a password, add TAURI_SIGNING_PRIVATE_KEY_PASSWORD back.
          # macOS code signing + notarization (see docs/MACOS_SIGNING.md).
          # All six secrets must exist — an empty APPLE_CERTIFICATE makes
          # tauri-action attempt (and fail) the keychain import.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
           # macOS code signing + notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "odoodev-gui ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform below. Installed apps update themselves automatically on the next launch."
          # Must be published (not a draft): the updater resolves latest.json via
          # the /releases/latest/download/ URL, which ignores drafts.
          releaseDraft: false